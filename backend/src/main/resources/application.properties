spring.application.name=backend
# Créer la base dans phpMyAdmin si besoin : CREATE DATABASE centre_db;
spring.datasource.url=jdbc:mysql://localhost:3306/centre_db?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
jwt.secret=centreReeducationPhysiqueSecretKey2026DevOnly
jwt.expiration=86400000