spring.application.name=backend
spring.datasource.url=jdbc:mysql://localhost:3306/centre_db?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# HikariCP
spring.datasource.hikari.maximum-pool-size=30
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# CRUCIAL - désactive Open Session In View
spring.jpa.open-in-view=false

jwt.secret=centreReeducationPhysiqueSecretKey2026DevOnly
jwt.expiration=86400000

spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=email,profile

# Où rediriger le navigateur une fois la connexion Google terminée (avec ?token=...)
app.oauth2.authorized-redirect-uri=${OAUTH2_REDIRECT_URI:http://localhost:5173/oauth2/redirect}

# Envoi d'email (Gmail SMTP) : GMAIL_USERNAME = adresse Gmail, GMAIL_APP_PASSWORD = mot
# de passe d'application (Google Account > Sécurité > Validation en 2 étapes > Mots de
# passe des applications) — jamais le mot de passe Gmail normal.
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${GMAIL_USERNAME:chtiouiamine2006@gmail.com}
spring.mail.password=${GMAIL_APP_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Rappels de rendez-vous par email (ReminderScheduler) : adresse affichée dans l'email
# et fréquence (ms) à laquelle le scheduler vérifie les rendez-vous à venir.
centre.address=Bouznika, Maroc
reminder.poll-interval-ms=300000